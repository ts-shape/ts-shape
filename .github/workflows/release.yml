name: Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Job 0: Run Tests
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=ts_shape --cov-report=term -v

  # =============================================================================
  # Job 1: Auto-increment version tag
  # =============================================================================
  auto-tag:
    name: Auto Tag Version
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Bump patch version and create tag
        id: bump
        run: |
          # Get the latest version tag (e.g. 0.0.30)
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse and increment patch version
          MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Create and push the new tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

  # =============================================================================
  # Job 2: Build Documentation (MkDocs Material)
  # =============================================================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: auto-tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package and documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"

      - name: Build MkDocs documentation
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: 'site'

  # =============================================================================
  # Job 3: Deploy Documentation to GitHub Pages
  # =============================================================================
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  # =============================================================================
  # Job 4: Build Python Package
  # =============================================================================
  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: auto-tag

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Inject static version into pyproject.toml
        run: |
          VERSION="${{ needs.auto-tag.outputs.new_version }}"
          echo "Injecting version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "::error::Version output from auto-tag job is empty!"
            exit 1
          fi
          # Replace dynamic version with static version
          sed -i 's/^dynamic = \["version"\]/version = "'"$VERSION"'"/' pyproject.toml
          # Remove setuptools-scm from build requires
          sed -i 's/, "setuptools-scm>=8"//' pyproject.toml
          # Remove [tool.setuptools-scm] section
          sed -i '/^\[tool\.setuptools-scm\]/,/^$/d' pyproject.toml
          echo "--- pyproject.toml (relevant lines) ---"
          head -10 pyproject.toml

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify built version
        run: |
          EXPECTED="${{ needs.auto-tag.outputs.new_version }}"
          echo "Expected version: $EXPECTED"
          ls -la dist/
          if ls dist/ | grep -q "0.0.0"; then
            echo "::error::Build produced version 0.0.0 instead of $EXPECTED!"
            exit 1
          fi
          if ! ls dist/ | grep -q "$EXPECTED"; then
            echo "::error::No artifact found with expected version $EXPECTED!"
            exit 1
          fi

      - name: Verify package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*

  # =============================================================================
  # Job 5: Publish to PyPI
  # =============================================================================
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-package

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
