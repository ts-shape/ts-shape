name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  pip-compile:
    name: Regenerate requirements.txt
    if: github.actor == 'renovate[bot]' || github.actor == 'renovatebot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Regenerate requirements.txt
        run: pip-compile --strip-extras --output-file=requirements.txt pyproject.toml

      - name: Commit updated requirements.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git diff --cached --quiet || git commit -m "chore: regenerate requirements.txt via pip-compile"
          git push

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install black==26.3.1 ruff==0.15.8

      - name: Check formatting (black)
        run: black --check src/ tests/

      - name: Lint (ruff)
        run: ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [pip-compile]
    if: always() && (needs.pip-compile.result == 'success' || needs.pip-compile.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        include:
          - python-version: '3.14'
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.experimental || false }}
          cache: 'pip'

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          PYTHONDEVMODE: "1"
        run: |
          pytest --cov=ts_shape --cov-report=xml --cov-report=term -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  scan:
    name: Deprecation & vulnerability scan
    runs-on: ubuntu-latest
    needs: [pip-compile]
    if: always() && (needs.pip-compile.result == 'success' || needs.pip-compile.result == 'skipped')
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install package, dev extras, and scan tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pip-audit

      - name: Capture runtime DeprecationWarnings from tests
        continue-on-error: true
        run: |
          pytest -W error::DeprecationWarning -W error::PendingDeprecationWarning \
            --tb=line -q 2>&1 | tee deprecation-warnings.txt

      - name: Pyupgrade scan (ruff UP rules, advisory)
        continue-on-error: true
        run: |
          ruff check --select UP src/ tests/ 2>&1 | tee ruff-pyupgrade.txt

      - name: Static @deprecated detection (mypy PEP 702)
        continue-on-error: true
        run: |
          mypy 2>&1 | tee mypy-deprecated.txt

      - name: Vulnerability scan (pip-audit)
        continue-on-error: true
        run: |
          pip-audit --format=json --output pip-audit.json || true
          pip-audit | tee pip-audit.txt || true

      - name: Outdated dependencies
        continue-on-error: true
        run: |
          pip list --outdated --format=json > outdated.json || true
          pip list --outdated | tee outdated.txt || true

      - name: Upload scan artefacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deprecation-scan
          path: |
            deprecation-warnings.txt
            ruff-pyupgrade.txt
            mypy-deprecated.txt
            pip-audit.json
            pip-audit.txt
            outdated.json
            outdated.txt
          retention-days: 14
