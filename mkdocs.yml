theme:
  name: material
  logo: assets/ts-shape.png
  favicon: assets/favicon-16x16.png
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - search.highlight
  - search.suggest
  - toc.follow
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: purple
    toggle:
      icon: material/weather-sunny
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: lime
    toggle:
      icon: material/weather-night
      name: Switch to system preference

markdown_extensions:
- attr_list
- md_in_html
- admonition
- footnotes
- pymdownx.details
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.highlight:
    pygments_lang_class: true
- pymdownx.magiclink
- pymdownx.snippets:
    base_path: [!relative $config_dir]
    check_paths: true
- pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.tabbed:
    alternate_style: true
    slugify: !!python/object/apply:pymdownx.slugs.slugify
      kwds:
        case: lower
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tilde
- toc:
    permalink: "¤"

plugins:
- search
- gen-files:
    scripts:
    - scripts/gen_ref_pages.py  # (2)!
    - scripts/gen_architecture_graph.py
- literate-nav:
    nav_file: SUMMARY.md
- mkdocstrings:
    handlers:
      python:
        paths: [src]
        options:
          docstring_style: google
          docstring_section_style: table
          show_source: false
          show_root_heading: true
          show_root_full_path: false
          heading_level: 2
          members_order: source
          filters: ["!^_"]
          merge_init_into_class: true
          separate_signature: true
          show_signature_annotations: true

extra_css:
  - stylesheets/extra.css
  - assets/architecture-sunburst.css

extra_javascript:
  - https://d3js.org/d3.v7.min.js
  - assets/architecture-sunburst.js
  - https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js
  - javascripts/pyodide-repl.js

extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/ts-shape
  - icon: fontawesome/brands/python
    link: https://pypi.org/project/ts-shape/
